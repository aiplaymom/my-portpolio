<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트폴리오 비중 계산기</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-title" content="비중계산">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2c3e50">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6f8;
    --paper: #ffffff;
    --ink: #1f2937;
    --ink-soft: #4b5563;
    --accent: #2c3e50;
    --accent-deep: #1a252f;
    --accent-soft: #e8ecf1;
    --line: #e5e7eb;
    --muted: #9ca3af;
    --positive: #10b981;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 20px 16px 60px;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
    padding-top: 8px;
  }

  .logo {
    width: 56px;
    height: 56px;
    margin: 0 auto 12px;
    background: var(--accent);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(44, 62, 80, 0.2);
  }

  .logo svg {
    width: 30px;
    height: 30px;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 500;
  }

  h1 {
    font-weight: 700;
    font-size: 24px;
    line-height: 1.3;
    letter-spacing: -0.03em;
  }

  .subtitle {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
  }

  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 12px;
  }

  .step-label {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
    letter-spacing: 0.08em;
    font-weight: 500;
  }

  .card h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 14px;
    letter-spacing: -0.02em;
  }

  input[type="date"],
  input[type="text"],
  input[type="number"] {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--paper);
    padding: 11px 14px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    transition: border-color 0.15s ease;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
  }

  input::placeholder {
    color: var(--muted);
  }

  /* 종목 행 */
  .stock-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .stock-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 28px;
    gap: 8px;
    align-items: center;
  }

  .stock-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .stock-row input[type="text"] {
    padding: 10px 12px;
    font-size: 13px;
    min-width: 0;
  }

  .amount-wrap {
    position: relative;
    min-width: 0;
  }

  .amount-wrap::after {
    content: '원';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: var(--muted);
    pointer-events: none;
  }

  .amount-wrap input {
    padding: 10px 28px 10px 12px !important;
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  .delete-row-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .delete-row-btn:hover {
    background: #fee2e2;
    color: #dc2626;
  }

  .delete-row-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .add-btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: 1px dashed var(--line);
    background: transparent;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .add-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }

  .add-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .main-btn {
    width: 100%;
    background: var(--accent);
    color: var(--paper);
    border: none;
    padding: 15px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    margin-top: 12px;
  }

  .main-btn:hover {
    background: var(--accent-deep);
  }

  .main-btn:active {
    transform: scale(0.99);
  }

  /* 결과 영역 */
  .result-section {
    display: none;
  }

  .result-section.show {
    display: block;
  }

  .total-card {
    background: var(--accent);
    color: var(--paper);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
    text-align: center;
  }

  .total-card .date-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .total-card .label {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: 4px;
  }

  .total-card .amount {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  /* 차트 */
  .chart-card {
    text-align: center;
  }

  .chart-wrap {
    position: relative;
    width: 100%;
    max-width: 280px;
    margin: 0 auto 16px;
  }

  .chart-wrap svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .chart-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .chart-center .count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
  }

  .chart-center .count-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* 범례 / 비중 리스트 */
  .legend {
    margin-top: 8px;
  }

  .legend-item {
    display: grid;
    grid-template-columns: 14px 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 11px 0;
    border-bottom: 1px solid var(--line);
  }

  .legend-item:last-child {
    border-bottom: none;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .legend-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  .legend-amount {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .legend-pct {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    min-width: 50px;
    text-align: right;
  }

  /* 액션 버튼들 */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
  }

  .actions.actions-three {
    grid-template-columns: 1fr;
  }

  .actions.actions-three .action-btn.primary {
    grid-column: 1 / -1;
  }

  .actions.actions-three .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .action-btn {
    padding: 12px;
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .action-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
  }

  .action-btn.primary {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
    font-weight: 600;
    padding: 14px;
    font-size: 14px;
  }

  .action-btn.primary:hover {
    background: var(--accent-deep);
    border-color: var(--accent-deep);
  }

  .action-btn:active {
    transform: scale(0.99);
  }

  .footer-note {
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 24px;
    letter-spacing: 0.1em;
  }

  /* 토스트 알림 */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: var(--paper);
    padding: 14px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1000;
    max-width: 90%;
    text-align: center;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  @media (max-width: 380px) {
    h1 { font-size: 20px; }
    .stock-row {
      grid-template-columns: 24px 1fr 1fr 24px;
      gap: 6px;
    }
    .stock-num {
      width: 24px;
      height: 24px;
      font-size: 10px;
    }
    .stock-row input { font-size: 12px !important; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <!-- 파이차트 아이콘 -->
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="12" stroke="#ffffff" stroke-width="2.5" fill="none"/>
        <path d="M16 4 A12 12 0 0 1 26.39 22 L16 16 Z" fill="#ffffff"/>
        <path d="M26.39 22 A12 12 0 0 1 20 27.32 L16 16 Z" fill="#10b981" opacity="0.85"/>
      </svg>
    </div>
    <div class="eyebrow">PORTFOLIO · 비중 계산</div>
    <h1>내 포트폴리오,<br>한눈에 보기</h1>
    <p class="subtitle">종목과 평가금액을 넣으면 비중을 계산해드려요</p>
  </header>

  <!-- Step 1: 날짜 -->
  <div class="card">
    <span class="step-label">STEP 01</span>
    <h2>📅 기준일</h2>
    <input type="date" id="snapshotDate">
  </div>

  <!-- Step 2: 종목 입력 -->
  <div class="card">
    <span class="step-label">STEP 02</span>
    <h2>📊 종목과 평가금액</h2>
    <div class="stock-list" id="stockList"></div>
    <button class="add-btn" id="addBtn" onclick="addStock()">＋ 종목 추가</button>
    <button class="main-btn" onclick="calculate()">비중 계산하기 →</button>
  </div>

  <!-- 결과 -->
  <div class="result-section" id="resultSection">
    <div class="total-card">
      <div class="date-label" id="resultDate"></div>
      <div class="label">총 평가금액</div>
      <div class="amount" id="totalAmount">0원</div>
    </div>

    <div class="card chart-card">
      <span class="step-label">RESULT</span>
      <h2>📈 종목별 비중</h2>
      <div class="chart-wrap">
        <svg id="pieChart" viewBox="0 0 200 200"></svg>
        <div class="chart-center">
          <div class="count" id="stockCount">0</div>
          <div class="count-label">종목</div>
        </div>
      </div>
      <div class="legend" id="legend"></div>
    </div>

    <div class="actions actions-three">
      <button class="action-btn primary" onclick="saveAsImage()">📸 이미지로 저장하기</button>
      <div class="row-2">
        <button class="action-btn" onclick="scrollToTop()">↑ 위로</button>
        <button class="action-btn" onclick="resetAll()">↺ 초기화</button>
      </div>
    </div>
  </div>

  <div class="footer-note">SIMPLE PORTFOLIO TRACKER · 2025</div>
</div>

<script>
  const MAX_STOCKS = 10;
  // 차분하고 구분 잘 되는 색상 팔레트
  const COLORS = [
    '#2c3e50', '#e67e22', '#16a085', '#8e44ad', '#c0392b',
    '#27ae60', '#2980b9', '#d35400', '#7f8c8d', '#f39c12'
  ];

  let stocks = [
    { name: '', amount: '' },
    { name: '', amount: '' },
    { name: '', amount: '' }
  ];

  // 오늘 날짜로 초기화
  function formatDateForInput(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }
  document.getElementById('snapshotDate').value = formatDateForInput(new Date());

  // 종목 행 렌더링
  function renderStocks() {
    const list = document.getElementById('stockList');
    list.innerHTML = '';

    stocks.forEach((stock, idx) => {
      const row = document.createElement('div');
      row.className = 'stock-row';
      row.innerHTML = `
        <div class="stock-num">${idx + 1}</div>
        <input type="text" placeholder="종목명" value="${escapeAttr(stock.name)}" 
               oninput="updateStock(${idx}, 'name', this.value)" maxlength="20">
        <div class="amount-wrap">
          <input type="number" placeholder="0" value="${stock.amount}" min="0"
                 inputmode="numeric"
                 oninput="updateStock(${idx}, 'amount', this.value)">
        </div>
        <button class="delete-row-btn" onclick="removeStock(${idx})" 
                ${stocks.length <= 1 ? 'disabled' : ''} title="삭제">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      `;
      list.appendChild(row);
    });

    // 추가 버튼 비활성 상태 업데이트
    const addBtn = document.getElementById('addBtn');
    addBtn.disabled = stocks.length >= MAX_STOCKS;
    addBtn.textContent = stocks.length >= MAX_STOCKS 
      ? `최대 ${MAX_STOCKS}개까지` 
      : '＋ 종목 추가';
  }

  function escapeAttr(text) {
    return String(text).replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function updateStock(idx, field, value) {
    stocks[idx][field] = value;
  }

  function addStock() {
    if (stocks.length >= MAX_STOCKS) return;
    stocks.push({ name: '', amount: '' });
    renderStocks();
    // 새로 추가된 행의 종목명 입력란에 포커스
    setTimeout(() => {
      const inputs = document.querySelectorAll('.stock-row input[type="text"]');
      if (inputs.length > 0) inputs[inputs.length - 1].focus();
    }, 50);
  }

  function removeStock(idx) {
    if (stocks.length <= 1) return;
    stocks.splice(idx, 1);
    renderStocks();
  }

  // 금액 포맷
  function fmt(n) {
    return Math.round(n).toLocaleString('ko-KR');
  }

  // 날짜 포맷
  function formatDateDisplay(dateStr) {
    const d = new Date(dateStr);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}.${m}.${day}`;
  }

  // 계산 및 결과 표시
  function calculate() {
    // 유효한 종목만 필터링
    const valid = stocks
      .map(s => ({
        name: s.name.trim() || '이름없음',
        amount: parseFloat(s.amount) || 0
      }))
      .filter(s => s.amount > 0);

    if (valid.length === 0) {
      alert('금액을 1개 이상 입력해 주세요!');
      return;
    }

    const total = valid.reduce((sum, s) => sum + s.amount, 0);

    // 비중 계산 + 색상 부여
    const items = valid.map((s, i) => ({
      ...s,
      pct: (s.amount / total) * 100,
      color: COLORS[i % COLORS.length]
    }));

    // 비중 큰 순으로 정렬
    items.sort((a, b) => b.amount - a.amount);
    // 정렬 후에도 색상은 인덱스 순서 유지하기 위해 재할당
    items.forEach((item, i) => {
      item.color = COLORS[i % COLORS.length];
    });

    // 결과 표시
    document.getElementById('resultDate').textContent = 
      formatDateDisplay(document.getElementById('snapshotDate').value) + ' 기준';
    document.getElementById('totalAmount').textContent = fmt(total) + '원';
    document.getElementById('stockCount').textContent = items.length;

    drawPieChart(items);
    renderLegend(items);

    const section = document.getElementById('resultSection');
    section.classList.add('show');
    setTimeout(() => {
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }

  // 파이 차트 그리기 (SVG)
  function drawPieChart(items) {
    const svg = document.getElementById('pieChart');
    svg.innerHTML = '';

    const cx = 100, cy = 100;
    const outerR = 90;
    const innerR = 55; // 도넛 차트 형태

    if (items.length === 1) {
      // 단일 종목이면 그냥 도넛 모양 원
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const d = `
        M ${cx - outerR} ${cy}
        A ${outerR} ${outerR} 0 1 0 ${cx + outerR} ${cy}
        A ${outerR} ${outerR} 0 1 0 ${cx - outerR} ${cy}
        M ${cx - innerR} ${cy}
        A ${innerR} ${innerR} 0 1 1 ${cx + innerR} ${cy}
        A ${innerR} ${innerR} 0 1 1 ${cx - innerR} ${cy}
        Z
      `;
      circle.setAttribute('d', d);
      circle.setAttribute('fill', items[0].color);
      circle.setAttribute('fill-rule', 'evenodd');
      svg.appendChild(circle);
      return;
    }

    let currentAngle = -Math.PI / 2; // 12시 방향에서 시작

    items.forEach(item => {
      const sliceAngle = (item.pct / 100) * 2 * Math.PI;
      const endAngle = currentAngle + sliceAngle;

      const x1 = cx + outerR * Math.cos(currentAngle);
      const y1 = cy + outerR * Math.sin(currentAngle);
      const x2 = cx + outerR * Math.cos(endAngle);
      const y2 = cy + outerR * Math.sin(endAngle);

      const x3 = cx + innerR * Math.cos(endAngle);
      const y3 = cy + innerR * Math.sin(endAngle);
      const x4 = cx + innerR * Math.cos(currentAngle);
      const y4 = cy + innerR * Math.sin(currentAngle);

      const largeArc = sliceAngle > Math.PI ? 1 : 0;

      const d = `
        M ${x1} ${y1}
        A ${outerR} ${outerR} 0 ${largeArc} 1 ${x2} ${y2}
        L ${x3} ${y3}
        A ${innerR} ${innerR} 0 ${largeArc} 0 ${x4} ${y4}
        Z
      `;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('fill', item.color);
      path.setAttribute('stroke', '#ffffff');
      path.setAttribute('stroke-width', '2');
      svg.appendChild(path);

      // 비중이 8% 이상이면 차트 안에 % 표시
      if (item.pct >= 8) {
        const midAngle = currentAngle + sliceAngle / 2;
        const labelR = (outerR + innerR) / 2;
        const lx = cx + labelR * Math.cos(midAngle);
        const ly = cy + labelR * Math.sin(midAngle);

        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', lx);
        text.setAttribute('y', ly);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'middle');
        text.setAttribute('fill', '#ffffff');
        text.setAttribute('font-size', '11');
        text.setAttribute('font-weight', '600');
        text.setAttribute('font-family', 'IBM Plex Mono, monospace');
        text.textContent = item.pct.toFixed(0) + '%';
        svg.appendChild(text);
      }

      currentAngle = endAngle;
    });
  }

  // 범례 렌더링
  function renderLegend(items) {
    const legend = document.getElementById('legend');
    legend.innerHTML = '';

    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'legend-item';
      row.innerHTML = `
        <div class="legend-dot" style="background:${item.color}"></div>
        <div class="legend-name">${escapeAttr(item.name)}</div>
        <div class="legend-amount">${fmt(item.amount)}원</div>
        <div class="legend-pct">${item.pct.toFixed(1)}%</div>
      `;
      legend.appendChild(row);
    });
  }

  // 토스트 알림 표시
  function showToast(message, duration = 2500) {
    const existing = document.getElementById('toast');
    if (existing) existing.remove();

    const toast = document.createElement('div');
    toast.id = 'toast';
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);

    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }

  // 이미지로 저장 - Canvas로 차트 + 종목 리스트 그리기
  async function saveAsImage() {
    const valid = stocks
      .map(s => ({
        name: s.name.trim() || '이름없음',
        amount: parseFloat(s.amount) || 0
      }))
      .filter(s => s.amount > 0);

    if (valid.length === 0) {
      alert('먼저 비중을 계산해 주세요!');
      return;
    }

    const total = valid.reduce((sum, s) => sum + s.amount, 0);
    const items = valid.map((s, i) => ({
      ...s,
      pct: (s.amount / total) * 100
    }));
    items.sort((a, b) => b.amount - a.amount);
    items.forEach((item, i) => {
      item.color = COLORS[i % COLORS.length];
    });

    const dateStr = formatDateDisplay(document.getElementById('snapshotDate').value);

    // 캔버스 크기 (인스타 1:1.25 비율 기준)
    const W = 1080;
    const lineHeight = 75;
    const baseHeight = 1100;
    const extraPerItem = Math.max(0, items.length - 5) * lineHeight;
    const H = baseHeight + extraPerItem;

    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');

    // 배경
    ctx.fillStyle = '#f5f6f8';
    ctx.fillRect(0, 0, W, H);

    // 상단 헤더 영역 (네이비 박스)
    ctx.fillStyle = '#2c3e50';
    ctx.beginPath();
    roundRect(ctx, 60, 60, W - 120, 200, 24);
    ctx.fill();

    // 날짜 (작게)
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '500 22px "IBM Plex Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(dateStr + ' 기준', W / 2, 115);

    // "총 평가금액"
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = '500 26px Pretendard, sans-serif';
    ctx.fillText('총 평가금액', W / 2, 160);

    // 금액 (크게)
    ctx.fillStyle = '#ffffff';
    ctx.font = '600 56px "IBM Plex Mono", monospace';
    ctx.fillText(fmt(total) + '원', W / 2, 225);

    // 파이 차트 그리기
    const cx = W / 2;
    const cy = 470;
    const outerR = 180;
    const innerR = 110;

    let currentAngle = -Math.PI / 2;
    items.forEach(item => {
      const sliceAngle = (item.pct / 100) * 2 * Math.PI;
      const endAngle = currentAngle + sliceAngle;

      ctx.fillStyle = item.color;
      ctx.beginPath();
      ctx.moveTo(cx + outerR * Math.cos(currentAngle), cy + outerR * Math.sin(currentAngle));
      ctx.arc(cx, cy, outerR, currentAngle, endAngle);
      ctx.lineTo(cx + innerR * Math.cos(endAngle), cy + innerR * Math.sin(endAngle));
      ctx.arc(cx, cy, innerR, endAngle, currentAngle, true);
      ctx.closePath();
      ctx.fill();

      // 흰색 테두리 (구분선)
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.stroke();

      // 8% 이상이면 차트 안에 % 표시
      if (item.pct >= 8) {
        const midAngle = currentAngle + sliceAngle / 2;
        const labelR = (outerR + innerR) / 2;
        const lx = cx + labelR * Math.cos(midAngle);
        const ly = cy + labelR * Math.sin(midAngle);

        ctx.fillStyle = '#ffffff';
        ctx.font = '600 22px "IBM Plex Mono", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(item.pct.toFixed(0) + '%', lx, ly);
      }

      currentAngle = endAngle;
    });

    // 차트 중앙 텍스트
    ctx.fillStyle = '#1f2937';
    ctx.font = '600 44px "IBM Plex Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(items.length), cx, cy - 8);

    ctx.fillStyle = '#9ca3af';
    ctx.font = '500 20px Pretendard, sans-serif';
    ctx.fillText('종목', cx, cy + 28);

    // 종목별 비중 리스트
    const listStartY = 720;
    ctx.textBaseline = 'alphabetic';

    items.forEach((item, idx) => {
      const y = listStartY + idx * lineHeight;

      // 색상 점
      ctx.fillStyle = item.color;
      roundRect(ctx, 100, y - 18, 24, 24, 6);
      ctx.fill();

      // 종목명
      ctx.fillStyle = '#1f2937';
      ctx.font = '600 28px Pretendard, sans-serif';
      ctx.textAlign = 'left';
      const maxNameWidth = 400;
      let name = item.name;
      if (ctx.measureText(name).width > maxNameWidth) {
        while (ctx.measureText(name + '...').width > maxNameWidth && name.length > 0) {
          name = name.slice(0, -1);
        }
        name += '...';
      }
      ctx.fillText(name, 145, y);

      // 금액
      ctx.fillStyle = '#9ca3af';
      ctx.font = '500 24px "IBM Plex Mono", monospace';
      ctx.textAlign = 'right';
      ctx.fillText(fmt(item.amount) + '원', W - 230, y);

      // 비중 %
      ctx.fillStyle = '#1f2937';
      ctx.font = '600 30px "IBM Plex Mono", monospace';
      ctx.textAlign = 'right';
      ctx.fillText(item.pct.toFixed(1) + '%', W - 100, y);

      // 구분선
      if (idx < items.length - 1) {
        ctx.strokeStyle = '#e5e7eb';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(100, y + 28);
        ctx.lineTo(W - 100, y + 28);
        ctx.stroke();
      }
    });

    // 푸터
    const footerY = H - 50;
    ctx.fillStyle = '#9ca3af';
    ctx.font = '500 20px "IBM Plex Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('MY PORTFOLIO', W / 2, footerY);

    // 이미지 저장
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const fileDate = document.getElementById('snapshotDate').value.replace(/-/g, '');
      link.href = url;
      link.download = `포트폴리오_${fileDate}.png`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      
      showToast('✅ 이미지가 저장되었어요!');
    }, 'image/png');
  }

  // 둥근 사각형 헬퍼
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function resetAll() {
    if (!confirm('모든 종목 정보를 지우고 처음부터 다시 시작할까요?')) return;
    stocks = [
      { name: '', amount: '' },
      { name: '', amount: '' },
      { name: '', amount: '' }
    ];
    document.getElementById('snapshotDate').value = formatDateForInput(new Date());
    document.getElementById('resultSection').classList.remove('show');
    renderStocks();
    scrollToTop();
  }

  // 초기 렌더링
  renderStocks();
</script>
